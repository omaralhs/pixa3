name: Deploy to AWS EC2

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Deploy to EC2 Server
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: 54.167.21.144
        username: ubuntu
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        timeout: 60s
        command_timeout: 15m
        script: |
          ~/deploy.sh
