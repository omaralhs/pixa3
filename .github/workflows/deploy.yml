name: Deploy to AWS EC2

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Deploy to EC2 Server
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: 54.88.53.94
        username: ubuntu
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        timeout: 60s
        command_timeout: 15m
        script: |
          cd ~/pixa3
          
          # Stash any local changes to .env files
          git stash
          
          # Pull latest code
          git pull origin main
          
          # Restore stashed changes
          git stash pop || echo "No stash to restore"
          
          # Update backend
          cd backend
          npm install --production
          
          # Run database migrations
          echo "🔄 Running database migrations..."
          node run-migration.js || echo "⚠️ Migration may have already been applied"
          
          pm2 restart pixa-backend
          
          # Update frontend
          cd ../frontend
          
          # Stash any local .env changes in frontend too
          git stash
          
          npm install
          npm run build
          
          # Restore frontend .env if needed
          git stash pop || echo "No frontend stash to restore"
          
          echo "✅ Deployment complete!"
